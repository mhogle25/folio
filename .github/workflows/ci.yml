name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: folio
    runs-on: ubuntu-latest
    steps:
      # folio's build.zig.zon pins `.lish = .path "../lish"`, so lish
      # must sit beside it. Tests against lish's main branch.
      - name: Checkout folio
        uses: actions/checkout@v4
        with:
          path: folio
      - name: Checkout lish
        uses: actions/checkout@v4
        with:
          repository: mhogle25/lish
          path: lish
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: zig build test
        working-directory: folio
        run: zig build test
      # The generated/ constants are committed and vendored by tree-sitter-folio;
      # fail if they drift from token.zig.
      - name: generated artifacts up to date
        working-directory: folio
        run: |
          zig build gen
          git diff --exit-code generated/
